<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Тренера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-color: var(--tg-theme-button-color, #248bed); }
        body { font-family: -apple-system, system-ui, sans-serif; padding: 15px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 0; }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .btn-main { background: var(--main-color); color: white; }
        .btn-green { background: #2ecc71; color: white; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--main-color); color: var(--main-color); margin-top: 10px; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-size: 16px; box-sizing: border-box; }
        label { font-size: 13px; opacity: 0.7; margin-left: 5px; }
        .hidden { display: none; }
        .debt-alert { background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 8px; font-size: 12px; }
        .header { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h3 id="welcome">Загрузка...</h3>
        <div id="adminBadge" class="hidden" style="color: #f39c12; font-size: 12px;">★ Режим Администратора</div>
    </div>

    <div class="tab-menu">
        <button class="btn tab-btn btn-main" onclick="showScreen('screen-add')">Записать ПТ</button>
        <button class="btn tab-btn btn-outline" onclick="showScreen('screen-stats')">Мои отчеты</button>
        <button id="adminTab" class="btn tab-btn btn-outline hidden" onclick="showScreen('screen-admin')">Админка</button>
    </div>

    <div id="screen-add" class="screen">
        <div class="card">
            <label>Клиент</label>
            <select id="clientSelect" onchange="checkClientStatus()">
                <option value="">-- Выберите из списка --</option>
                <option value="new">+ ДОБАВИТЬ НОВОГО</option>
            </select>

            <div id="newClientFields" class="hidden">
                <input type="text" id="newClientName" placeholder="ФИО клиента">
                <label>Категория оплаты</label>
                <select id="newClientCat">
                    <option value="1 кт">1 кт (85 000)</option>
                    <option value="2 кт">2 кт (110 000)</option>
                    <option value="3 кт">3 кт (135 000)</option>
                </select>
                <button class="btn btn-green" onclick="handleAddNewClient()">Создать клиента</button>
            </div>
        </div>

        <div id="workoutFields" class="hidden">
            <div class="card">
                <label>Тип операции</label>
                <select id="wType" onchange="checkWType()">
                    <option value="Обычная">Обычная (Провел и оплатили)</option>
                    <option value="В долг">В долг (Провел, оплаты нет)</option>
                    <option value="Получил долг">Получил долг (Оплата за старую дату)</option>
                </select>

                <div id="debtDateBox" class="hidden debt-alert">
                    <label>Когда была тренировка?</label>
                    <input type="date" id="debtSourceDate">
                </div>

                <label>Количество ПТ</label>
                <input type="number" id="qty" value="1" min="1" max="5">

                <button class="btn btn-main" style="margin-top: 15px;" onclick="handleSaveWorkout()">СОХРАНИТЬ ЗАПИСЬ</button>
            </div>
        </div>
    </div>

    <div id="screen-stats" class="screen hidden">
        <div class="card">
            <h4>Моя статистика</h4>
            <p>Здесь будет шахматка тренировок (в разработке).</p>
        </div>
    </div>

    <div id="screen-admin" class="screen hidden">
        <div class="card">
            <h4>Панель управления</h4>
            <button class="btn btn-outline" onclick="alert('Выгрузка в Excel...')">Отчет по филиалу</button>
            <button class="btn btn-outline" style="margin-top:10px" onclick="alert('Список тренеров...')">Управление персоналом</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SUPABASE_URL = 'https://nkwfvuhtpaoxsaczwsrg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Замени на свой
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_ID = 118803972;
        let currentCoachClients = [];

        async function init() {
            const user = tg.initDataUnsafe?.user || { id: 118803972, first_name: "Влад" };
            document.getElementById('welcome').innerText = `Привет, ${user.first_name}!`;

            if (user.id === ADMIN_ID) {
                document.getElementById('adminTab').classList.remove('hidden');
                document.getElementById('adminBadge').classList.remove('hidden');
            }

            loadClients(user.id);
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        async function loadClients(coachId) {
            const { data } = await supabaseClient.from('clients').select('*').eq('coach_id', coachId);
            currentCoachClients = data || [];
            const select = document.getElementById('clientSelect');
            select.innerHTML = '<option value="">-- Выберите из списка --</option><option value="new">+ ДОБАВИТЬ НОВОГО</option>';
            currentCoachClients.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name} (${c.category})</option>`;
            });
        }

        function checkClientStatus() {
            const val = document.getElementById('clientSelect').value;
            document.getElementById('newClientFields').classList.toggle('hidden', val !== 'new');
            document.getElementById('workoutFields').classList.toggle('hidden', val === 'new' || val === '');
        }

        function checkWType() {
            const type = document.getElementById('wType').value;
            document.getElementById('debtDateBox').classList.toggle('hidden', type !== 'Получил долг');
        }

        async function handleAddNewClient() {
            const user = tg.initDataUnsafe?.user || { id: ADMIN_ID };
            const name = document.getElementById('newClientName').value;
            const cat = document.getElementById('newClientCat').value;

            if (!name) return alert("Введите имя");

            const { error } = await supabaseClient.from('clients').insert([{ coach_id: user.id, name, category: cat }]);
            if (!error) {
                document.getElementById('newClientName').value = '';
                loadClients(user.id);
                alert("Клиент добавлен!");
            }
        }

        async function handleSaveWorkout() {
            const user = tg.initDataUnsafe?.user || { id: ADMIN_ID };
            const clientId = document.getElementById('clientSelect').value;
            const type = document.getElementById('wType').value;
            const qty = document.getElementById('qty').value;
            const debtDate = document.getElementById('debtSourceDate').value;
            
            const client = currentCoachClients.find(c => c.id === clientId);

            const { error } = await supabaseClient.from('workouts').insert([{
                coach_id: user.id,
                client_id: clientId,
                workout_type: type,
                qty: parseInt(qty),
                category: client.category,
                debt_source_date: type === 'Получил долг' ? debtDate : null
            }]);

            if (!error) {
                tg.showPopup({ message: "Запись успешно добавлена!" }, () => tg.close());
            } else {
                alert("Ошибка: " + error.message);
            }
        }

        init();
    </script>
</body>
</html>
