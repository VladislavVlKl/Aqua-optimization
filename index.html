<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1d; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { padding: 20px; }
        #debug { font-size: 10px; color: gray; margin-top: 20px; }
        .btn { display: none; margin-top: 20px; padding: 10px 20px; background: #2481cc; color: white; border: none; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">Инициализация...</div>
    <div id="user-info"></div>
    <button id="main-btn" class="btn">Войти</button>
    <div id="debug"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SUPABASE_URL = 'https://nkwfvuhtpaoxsaczwsrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rd2Z2dWh0cGFveHNhY3p3c3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzUwMzIsImV4cCI6MjA5MzcxMTAzMn0.a2rKoLNBB4OGpuENu1XUhsfbc-8JmPbxEkvLrXqUM3A';
    
    const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function start() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        
        const user = tg.initDataUnsafe.user;
        
        if (!user) {
            status.innerText = "Запустите из Telegram";
            return;
        }

        debug.innerText = "Ваш ID: " + user.id;

        try {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .maybeSingle(); // Используем maybeSingle, чтобы не падать в ошибку если пусто

            if (error) {
                status.innerText = "Ошибка базы: " + error.message;
                return;
            }

            if (data) {
                status.innerText = "Доступ разрешен!";
                document.getElementById('user-info').innerText = "Привет, " + data.full_name + " (" + data.role + ")";
                document.getElementById('main-btn').style.display = "block";
            } else {
                status.innerText = "Доступ запрещен. ID " + user.id + " не в списке.";
            }
        } catch (e) {
            status.innerText = "Критическая ошибка: " + e.message;
        }
    }

    start();
</script>
</body>
</html>
